version: '3.8'

# ============================================================
#  OIKN WebGIS Training Stack
#  Services: PostGIS · GeoServer · GeoNetwork · Nginx
# ============================================================

services:

  # ─── PostGIS (Spatial Database) ─────────────────────────────────
  postgis:
    image: postgis/postgis:15-3.3
    container_name: oikn_postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gisuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gispassword}
      POSTGRES_DB: ${POSTGRES_DB:-gisdb}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./data/postgis/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./data/postgis/02_data.sql:/docker-entrypoint-initdb.d/02_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gisuser -d gisdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gis_network

  # ─── GeoServer (Map Server: WMS / WFS / WCS) ────────────────────
  geoserver:
    image: kartoza/geoserver:2.23.0
    container_name: oikn_geoserver
    restart: unless-stopped
    environment:
      GEOSERVER_DATA_DIR: /opt/geoserver/data_dir
      GEOSERVER_ADMIN_USER: ${GEOSERVER_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_PASSWORD:-geoserver}
      INITIAL_MEMORY: 512M
      MAXIMUM_MEMORY: 1G
      GEOSERVER_LOG_LEVEL: WARN
    ports:
      - "8080:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./data/geoserver:/opt/geoserver/custom
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/geoserver/web/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gis_network

  # ─── GeoNetwork (Metadata Catalog) ──────────────────────────────
  geonetwork:
    image: geonetwork:4.2
    container_name: oikn_geonetwork
    restart: unless-stopped
    environment:
      DATA_DIR: /catalogue-data
      JAVA_OPTIONS: -Dorg.eclipse.jetty.annotations.AnnotationParser.LEVEL=OFF
      ES_HOST: elasticsearch
      ES_PORT: 9200
    ports:
      - "8081:8080"
    volumes:
      - geonetwork_data:/catalogue-data
    depends_on:
      - postgis
    networks:
      - gis_network

  # ─── Nginx (Reverse Proxy + Frontend) ───────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: oikn_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./data/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - geoserver
    networks:
      - gis_network

# ─── Volumes ─────────────────────────────────────────────────────
volumes:
  postgis_data:
    driver: local
  geoserver_data:
    driver: local
  geonetwork_data:
    driver: local

# ─── Network ─────────────────────────────────────────────────────
networks:
  gis_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
